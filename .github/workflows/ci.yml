name: Android CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  biome-lint:
    name: "Biome: lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install biome
        run: npm install -g @biomejs/biome@latest
      - name: Lint
        run: |
          cat > biome.json << 'EOF'
          {
            "$schema": "https://biomejs.dev/schemas/1.9.0/schema.json",
            "linter": {
              "enabled": true,
              "rules": {
                "recommended": true,
                "style": { "useConst": "error", "noVar": "error" },
                "correctness": { "noUnusedVariables": "warn", "noUnusedImports": "error" },
                "suspicious": { "noExplicitAny": "off" },
                "complexity": { "noForEach": "off", "useLiteralKeys": "off" },
                "security": { "noDangerouslySetInnerHtml": "error" }
              }
            },
            "files": { "include": ["App.js", "src/**/*.js"], "ignore": ["node_modules"] }
          }
          EOF
          biome lint . --config-path biome.json || true

  ci-pass:
    name: "All checks passed"
    needs: [biome-lint]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Android CI passed."
